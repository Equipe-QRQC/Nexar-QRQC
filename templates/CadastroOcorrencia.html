{% extends 'menu.html' %}
{% block title %}Cadastro de Ocorrência — Nexar QRQC{% endblock %}

{% block content %}
<div class="topbar">
  <div class="topbar-title">
    <i class="fas fa-clipboard-list"></i> {{ t.cadastro_titulo }}
  </div>
</div>

<div class="page-body">
  <form action="{{ url_for('registrar_ocorrencia') }}" method="POST" id="formOcorrencia">
    <div class="grid-2">

      <!-- Coluna 1 — Identificação -->
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-search"></i> {{ t.identificacao }}</span>
        </div>
        <div class="card-body">

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-cogs" style="color:var(--primary); margin-right:5px;"></i>
              {{ t.maquina }}
            </label>
            <select name="maquina_id" class="form-select">
              <option value="">— Selecione a máquina —</option>
              {% for m in maquinas %}
              <option value="{{ m.id }}">{{ m.nome }} {% if m.setor %}({{ m.setor }}){% endif %}</option>
              {% endfor %}
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-calendar" style="color:var(--primary); margin-right:5px;"></i>
              Data e Hora
            </label>
            <input type="datetime-local" name="data_ocorrencia" class="form-control" required />
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-user-hard-hat" style="color:var(--primary); margin-right:5px;"></i>
              {{ t.operador }}
            </label>
            <input type="text" name="nome_operador" class="form-control"
                   placeholder="Nome completo do operador" required />
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-map-marker-alt" style="color:var(--primary); margin-right:5px;"></i>
              {{ t.setor }}
            </label>
            <input type="text" name="setor_area" class="form-control"
                   placeholder="Ex: Linha 3 — Montagem" required />
          </div>

          <div class="form-group">
            <label class="form-label">
              <i class="fas fa-comment-alt" style="color:var(--primary); margin-right:5px;"></i>
              {{ t.descricao }}
            </label>
            <textarea name="descricao" class="form-control" rows="4"
                      placeholder="Descreva o problema de forma clara e objetiva..." required></textarea>
          </div>

        </div>
      </div>

      <!-- Coluna 2 — Classificação -->
      <div class="card">
        <div class="card-header">
          <span class="card-title"><i class="fas fa-tag"></i> {{ t.classificacao }}</span>
        </div>
        <div class="card-body">

          <div class="form-group">
            <label class="form-label">{{ t.tipo }}</label>
            <select name="tipo_ocorrencia" class="form-select" required>
              <option value="Qualidade">🔵 Qualidade</option>
              <option value="Segurança">🔴 Segurança</option>
              <option value="Produção">🟡 Produção</option>
              <option value="Manutenção">🟢 Manutenção</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">{{ t.impacto }}</label>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-top:4px;">
              <label style="cursor:pointer;">
                <input type="radio" name="nivel_impacto" value="Baixo" style="display:none" class="impact-radio" />
                <div class="impact-btn" data-level="baixo" style="
                  text-align:center; padding:10px 6px; border-radius:var(--radius-sm);
                  border:2px solid var(--border); font-size:12px; font-weight:600;
                  color:var(--text-muted); transition:var(--transition); cursor:pointer;
                ">🟢 Baixo</div>
              </label>
              <label style="cursor:pointer;">
                <input type="radio" name="nivel_impacto" value="Médio" style="display:none" class="impact-radio" />
                <div class="impact-btn" data-level="medio" style="
                  text-align:center; padding:10px 6px; border-radius:var(--radius-sm);
                  border:2px solid var(--border); font-size:12px; font-weight:600;
                  color:var(--text-muted); transition:var(--transition); cursor:pointer;
                ">🟡 Médio</div>
              </label>
              <label style="cursor:pointer;">
                <input type="radio" name="nivel_impacto" value="Alto" style="display:none" class="impact-radio" />
                <div class="impact-btn" data-level="alto" style="
                  text-align:center; padding:10px 6px; border-radius:var(--radius-sm);
                  border:2px solid var(--border); font-size:12px; font-weight:600;
                  color:var(--text-muted); transition:var(--transition); cursor:pointer;
                ">🔴 Alto</div>
              </label>
            </div>
            <!-- hidden input fallback -->
            <select name="nivel_impacto_sel" id="nivelImpactoSel" class="form-select" style="display:none" required>
              <option value="Baixo">Baixo</option>
              <option value="Médio">Médio</option>
              <option value="Alto">Alto</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">{{ t.recorrente }}</label>
            <div style="display:flex; gap:8px;">
              <label style="flex:1; cursor:pointer;">
                <input type="radio" name="problema_recorrente" value="Sim" required style="display:none" />
                <div class="toggle-opt" style="
                  text-align:center; padding:10px; border-radius:var(--radius-sm);
                  border:2px solid var(--border); font-size:13px; font-weight:600;
                  color:var(--text-muted); transition:var(--transition); cursor:pointer;
                ">Sim</div>
              </label>
              <label style="flex:1; cursor:pointer;">
                <input type="radio" name="problema_recorrente" value="Não" required style="display:none" />
                <div class="toggle-opt" style="
                  text-align:center; padding:10px; border-radius:var(--radius-sm);
                  border:2px solid var(--border); font-size:13px; font-weight:600;
                  color:var(--text-muted); transition:var(--transition); cursor:pointer;
                ">Não</div>
              </label>
            </div>
          </div>

          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label">{{ t.detalhamento }}</label>
            <textarea name="detalhamento_tecnico" class="form-control" rows="5"
                      placeholder="Forneça detalhes técnicos: códigos de erro, leituras de sensores, comportamento observado..."
                      required></textarea>
          </div>

        </div>
      </div>

    </div>

    <!-- Ações -->
    <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
      <a href="{{ url_for('telaInicial') }}" class="btn btn-outline">
        <i class="fas fa-arrow-left"></i> {{ t.cancelar }}
      </a>
      <button type="reset" class="btn btn-ghost">
        <i class="fas fa-eraser"></i> {{ t.limpar }}
      </button>
      <button type="submit" class="btn btn-primary btn-lg">
        <i class="fas fa-paper-plane"></i> {{ t.registrar }}
      </button>
    </div>

  </form>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <p class="loading-text">Analisando com IA...</p>
</div>

{% endblock %}

{% block scripts %}
<script>
  // Seleção visual de impacto
  document.querySelectorAll('.impact-radio').forEach(radio => {
    radio.closest('label').addEventListener('click', function() {
      document.querySelectorAll('.impact-btn').forEach(b => {
        b.style.borderColor = 'var(--border)';
        b.style.color = 'var(--text-muted)';
        b.style.background = 'transparent';
      });
      const btn = this.querySelector('.impact-btn');
      const level = btn.dataset.level;
      const colors = { baixo: 'var(--success)', medio: 'var(--warning)', alto: 'var(--danger)' };
      btn.style.borderColor = colors[level];
      btn.style.color = colors[level];
      btn.style.background = level === 'baixo' ? 'var(--success-light)' :
                              level === 'medio' ? 'var(--warning-light)' : 'var(--danger-light)';
    });
  });

  // Seleção visual Sim/Não
  document.querySelectorAll('.toggle-opt').forEach(opt => {
    opt.closest('label').addEventListener('click', function() {
      this.closest('.form-group').querySelectorAll('.toggle-opt').forEach(o => {
        o.style.borderColor = 'var(--border)';
        o.style.color = 'var(--text-muted)';
        o.style.background = 'transparent';
      });
      opt.style.borderColor = 'var(--primary)';
      opt.style.color = 'var(--primary)';
      opt.style.background = 'var(--primary-light)';
    });
  });

  // Mostrar loading ao submeter
  document.getElementById('formOcorrencia').addEventListener('submit', function() {
    document.getElementById('loadingOverlay').classList.add('show');
  });
</script>
{% endblock %}
